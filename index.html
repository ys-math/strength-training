<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strength Training Progress</title>
    <meta name="description" content="Big-4 barbell strength progress dashboard" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%8B%EF%B8%8F%3C/text%3E%3C/svg%3E"
    />
    <script>
      // Sets data-theme before first paint so switching themes (or reloading
      // on a stored theme) never flashes the default theme first.
      // STORAGE_KEY here must match src/lib/theme.ts.
      ;(function () {
        var THEME_IDS = ['modern-dark', 'modern-light', 'cozy']
        try {
          var stored = localStorage.getItem('strength-training:theme')
          document.documentElement.setAttribute(
            'data-theme',
            THEME_IDS.indexOf(stored) !== -1 ? stored : 'modern-dark',
          )
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'modern-dark')
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
